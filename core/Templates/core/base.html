<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}NoteVault{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0f;
            --surface: #161618;
            --surface2: #1e1e22;
            --border: #2a2a30;
            --accent: #7c6dfa;
            --accent2: #f87c6d;
            --text: #f0f0f2;
            --muted: #888896;
            --green: #6dfaa0;
            --yellow: #fae06d;
            --red: #fa6d6d;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* NAV */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(13,13,15,0.9);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .nav-brand span { color: var(--accent2); }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a, .nav-links button {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            text-decoration: none;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links button:hover { color: var(--text); background: var(--surface2); }
        .nav-links .btn-primary {
            background: var(--accent);
            color: #fff;
            font-weight: 500;
        }
        .nav-links .btn-primary:hover { background: #6a5cf0; color: #fff; }

        /* MESSAGES */
        .messages { padding: 0.75rem 2rem; }
        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            border: 1px solid;
        }
        .message.success { background: rgba(109,250,160,0.1); border-color: var(--green); color: var(--green); }
        .message.error   { background: rgba(250,109,109,0.1); border-color: var(--red);   color: var(--red);   }
        .message.info    { background: rgba(124,109,250,0.1); border-color: var(--accent); color: var(--accent); }
        .message.warning { background: rgba(250,224,109,0.1); border-color: var(--yellow); color: var(--yellow); }

        /* LAYOUT */
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        /* BUTTONS */
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            border: none; cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #6a5cf0; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: rgba(250,109,109,0.15); color: var(--red); border: 1px solid var(--red); }
        .btn-danger:hover { background: rgba(250,109,109,0.3); }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

        /* FORMS */
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; letter-spacing: 0.3px; }
        .form-input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .errorlist { list-style: none; margin-top: 0.35rem; }
        .errorlist li { color: var(--red); font-size: 0.8rem; }
        .form-checkbox { width: 16px; height: 16px; accent-color: var(--accent); }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if user.is_authenticated %}
    <nav>
        <a href="{% url 'dashboard' %}" class="nav-brand">Note<span>Vault</span></a>
        <div class="nav-links">
            <span style="color:var(--muted);font-size:0.875rem;">{{ user.first_name|default:user.username }}</span>
            <a href="{% url 'note_create' %}" class="btn-primary">+ New Note</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        </div>
    </nav>
    {% endif %}

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
